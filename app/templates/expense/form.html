{% extends "base.html" %}
{% block title %}{{ '編輯' if transaction else '新增' }}紀錄 - 個人記帳簿{% endblock %}
{% block content %}
<h2 class="mb-4">
    <i class="bi bi-pencil-square"></i> {{ '編輯' if transaction else '新增' }}記帳紀錄
</h2>

<div class="card shadow">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="type" class="form-label">類型</label>
                    <select class="form-select" id="type" name="type" required>
                        <option value="expense" {{ 'selected' if transaction and transaction.type == 'expense' }}>支出</option>
                        <option value="income" {{ 'selected' if transaction and transaction.type == 'income' }}>收入</option>
                        <option value="transfer" {{ 'selected' if transaction and transaction.type == 'transfer' }}>轉帳</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="amount" class="form-label">金額</label>
                    <input type="number" class="form-control" id="amount" name="amount" min="1" step="1"
                           value="{{ transaction.amount if transaction else '' }}" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="category" class="form-label">類別</label>
                    <input type="text" class="form-control" id="category" name="category"
                           placeholder="例如：餐飲、交通、薪水"
                           value="{{ transaction.category if transaction else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="date" class="form-label">日期</label>
                    <input type="date" class="form-control" id="date" name="date"
                           value="{{ transaction.date if transaction else today }}" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="account_id" class="form-label">帳戶</label>
                    <select class="form-select" id="account_id" name="account_id" required>
                        {% for account in accounts %}
                        <option value="{{ account.id }}" {{ 'selected' if transaction and transaction.account_id == account.id }}>
                            {{ account.name }} (NT$ {{ "%.0f"|format(account.balance) }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3" id="to_account_group" style="display:none;">
                    <label for="to_account_id" class="form-label">轉入帳戶</label>
                    <select class="form-select" id="to_account_id" name="to_account_id">
                        <option value="">請選擇</option>
                        {% for account in accounts %}
                        <option value="{{ account.id }}" {{ 'selected' if transaction and transaction.to_account_id == account.id }}>
                            {{ account.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">備註</label>
                <input type="text" class="form-control" id="description" name="description"
                       value="{{ transaction.description if transaction else '' }}">
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i> 儲存
            </button>
            <a href="{{ url_for('expense.expense_history') }}" class="btn btn-secondary">取消</a>
        </form>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script>
    const typeSelect = document.getElementById('type');
    const toAccountGroup = document.getElementById('to_account_group');
    function toggleTransfer() {
        toAccountGroup.style.display = typeSelect.value === 'transfer' ? 'block' : 'none';
    }
    typeSelect.addEventListener('change', toggleTransfer);
    toggleTransfer();
</script>
{% endblock %}
