{% extends "base.html" %}
{% block title %}統計分析 - 個人記帳簿{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-bar-chart"></i> 統計分析</h2>

<div class="row">
    <div class="col-md-6 mb-4">
        <div class="card shadow">
            <div class="card-header"><h5 class="mb-0">支出類別分布</h5></div>
            <div class="card-body">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-6 mb-4">
        <div class="card shadow">
            <div class="card-header"><h5 class="mb-0">月度收支趨勢</h5></div>
            <div class="card-body">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const categoryData = {{ category_data | tojson }};
    const trendData = {{ trend_data | tojson }};

    // 圓餅圖
    if (categoryData.labels.length > 0) {
        new Chart(document.getElementById('categoryChart'), {
            type: 'doughnut',
            data: {
                labels: categoryData.labels,
                datasets: [{
                    data: categoryData.values,
                    backgroundColor: [
                        '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0',
                        '#9966FF', '#FF9F40', '#C9CBCF', '#7BC8A4'
                    ]
                }]
            }
        });
    }

    // 折線圖
    if (trendData.labels.length > 0) {
        new Chart(document.getElementById('trendChart'), {
            type: 'line',
            data: {
                labels: trendData.labels,
                datasets: [
                    {
                        label: '收入',
                        data: trendData.income,
                        borderColor: '#198754',
                        tension: 0.3
                    },
                    {
                        label: '支出',
                        data: trendData.expense,
                        borderColor: '#dc3545',
                        tension: 0.3
                    }
                ]
            }
        });
    }
</script>
{% endblock %}
