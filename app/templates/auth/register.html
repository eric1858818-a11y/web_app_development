{% extends "base.html" %}
{% block title %}註冊 - 個人記帳簿{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4"><i class="bi bi-person-plus"></i> 註冊</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">帳號</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密碼</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">確認密碼</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">註冊</button>
                </form>
                <p class="text-center mt-3">已有帳號？<a href="{{ url_for('auth.login') }}">前往登入</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
